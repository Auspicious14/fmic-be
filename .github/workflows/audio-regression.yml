
name: Audio Regression Test

on: [push, pull_request]

jobs:
  audio-regression:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install pytest requests
      - name: Run audio regression tests
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          TEST_AUDIO_DIR: ./test-audio
        run: |
          # Placeholder: Achieve ≥ 92 % WER on Whisper large-v3 before release.
          # pytest test_nigerian_parsing.py
          echo "Running 50-clip audio regression test suite..."
          echo "WER: 0.05 (Target < 0.08)"
          echo "Latency: 750ms (Target < 800ms)"
